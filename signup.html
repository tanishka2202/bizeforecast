<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signup - BizForecast</title>

  <!-- CSS from static folder -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/signup.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body>
  <div class="signup-container">
    <h2>Join BizForecast</h2>

    <!-- IMPORTANT: action & method added -->
      <form method="POST">


      <input type="text" name="firstName" placeholder="First Name *" required>
      <input type="text" name="lastName" placeholder="Last Name *" required>
      <input type="email" name="email" placeholder="Email *" required>
      <input list="regionList" name="region" placeholder="Region *" required>
      <datalist id="regionList">
        <option value="Mumbai">
        <option value="Pune">
        <option value="Thane">
        <option value="Nashik">
        <option value="Nagpur">
        <option value="Other">
      </datalist>

      <input type="password" name="password" placeholder="Password *" required>
      <input type="password" name="confirmPassword" placeholder="Confirm Password *" required>

      <button type="submit">Sign Up</button>

      <p class="alt-link">
        Already a user? <a href="{{ url_for('login') }}">Login</a>
      </p>

    </form>
  </div>

  <script src="{{ url_for('static', filename='js/signup.js') }}"></script>

</body>
</html>
